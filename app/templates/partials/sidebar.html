<div class="sidebar">
    <div class="brand">
        <i class="ti ti-shield-lock" aria-hidden="true"></i>
        <span>Vertex Access Control</span>
    </div>

    <div class="nav-group">
        <div class="nav-label">Overview</div>
        <a class="nav-item {% if active_page == 'dashboard' %}active{% endif %}"
           href="{{ url_for('dashboard.dashboard') }}">
            <i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard
        </a>

        <div class="nav-label">Identity</div>
        <a class="nav-item {% if active_page == 'users' %}active{% endif %}"
           href="{{ url_for('users.list_users') }}">
            <i class="ti ti-users" aria-hidden="true"></i> Users
        </a>
        <a class="nav-item {% if active_page == 'roles' %}active{% endif %}"
           href="{{ url_for('roles.list_roles') }}">
            <i class="ti ti-shield-check" aria-hidden="true"></i> Roles &amp; permissions
        </a>

        <div class="nav-label">Access</div>
        <a class="nav-item {% if active_page == 'requests' %}active{% endif %}"
           href="{{ url_for('requests.list_requests') }}">
            <i class="ti ti-lock-access" aria-hidden="true"></i> Access requests
        </a>

        {% if current_user.role in ['Admin', 'Manager', 'Analyst'] %}
        <div class="nav-label">Monitoring</div>
        <a class="nav-item {% if active_page == 'audit' %}active{% endif %}"
           href="{{ url_for('audit.list_logs') }}">
            <i class="ti ti-eye" aria-hidden="true"></i> Audit log
        </a>
        {% endif %}
    </div>

    <div class="sidebar-foot">
        <div class="avatar">{{ current_user.username[:2]|upper }}</div>
        <div>
            <p class="uname">{{ current_user.username }}</p>
            <p class="urole">{{ current_user.role }}</p>
        </div>
        <a href="{{ url_for('auth.logout') }}" class="logout-link" title="Log out">
            <i class="ti ti-logout" aria-hidden="true"></i>
        </a>
    </div>
</div>
