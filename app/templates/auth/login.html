{% extends 'base.html' %}
{% block title %}Sign in — Vertex Access Control{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-brand"><span class="icon-shield"></span><span>Vertex Access Control</span></div>
        <h1>Sign in</h1>
        <form method="POST">
            <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
            <button type="submit" class="btn-primary btn-block">Sign in</button>
        </form>
        <p class="auth-hint">Demo — username: <code>admin</code> password: <code>Admin@123</code></p>
    </div>
</div>
{% endblock %}
