{% extends 'base.html' %}
{% block title %}500 Server Error — Vertex Access Control{% endblock %}
{% block content %}
<div class="error-page">
    <div class="error-icon error-icon-amber">
        <i class="ti ti-alert-triangle"></i>
    </div>
    <h1 class="error-code">500</h1>
    <h2 class="error-title">Something Went Wrong</h2>
    <p class="error-message">
        An unexpected error occurred on the server.<br>
        Please try again shortly or contact your system administrator.
    </p>
    <div class="error-actions">
        <a href="{{ url_for('dashboard.dashboard') }}" class="btn-primary">
            <i class="ti ti-home"></i> Back to dashboard
        </a>
        <a href="javascript:location.reload()" class="btn-secondary">
            <i class="ti ti-refresh"></i> Try again
        </a>
    </div>
</div>
{% endblock %}
